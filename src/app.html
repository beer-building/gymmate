<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<!--<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
		/>-->
		<!-- без maximum-scale: блокировка зума нарушает WCAG 1.4.4 (iOS Safari её и так игнорирует) -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<meta name="text-scale" content="scale" />

		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e0f11" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f0e7" />
		<link
			rel="icon"
			type="image/png"
			sizes="48x48"
			href="%sveltekit.assets%/icons/favicon-48.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="192x192"
			href="%sveltekit.assets%/icons/icon-192.png"
		/>
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="GymMate" />

		<!-- шрифты self-hosted через fontsource, подключены в app.css -->
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
